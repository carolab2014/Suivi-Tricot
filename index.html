/* ===== V27 LUXE : mêmes dispositions, nouvelles couleurs seulement ===== */
:root{
  --bg:#F7F7F5;
  --card:#FCFCFB;
  --ink:#1E1E1E;
  --muted:#6F675A;
  --accent:#B58A58;
  --accentDark:#8D6B3F;
  --accent2:#F3EFE8;
  --line:#C8A875;
  --danger:#8E3B2F;
  --ok:#8D6B3F;
  --cream:#FCFCFB;
  --sand:#E7DDCC;
  --iconTone:#B58A58;
  --bronze:#B58A58;
  --shadow:0 12px 28px rgba(30,30,30,.11);
}
body{
  background:
    radial-gradient(circle at 15% 5%, rgba(181,138,88,.10), transparent 34%),
    linear-gradient(180deg,#ffffff 0%,#F7F7F5 100%) !important;
  color:var(--ink);
}
body.dark{

  --card:#232323;
  --ink:#F0E4CC;

  --accent:#B58A58;
  --accentDark:#D2B06F;
  --accent2:#2E2923;
  --line:#8D6B3F;
  --danger:#B76E5C;
  --ok:#B58A58;
  --cream:#232323;
  --sand:#2E2923;
  --iconTone:#B58A58;
  --bronze:#D2B06F;
  --shadow:0 14px 34px rgba(0,0,0,.45);

    radial-gradient(circle at 18% 8%, rgba(181,138,88,.12), transparent 32%),

}
.topbar{

  background:var(--card) !important;

.ruleLabel{color:#1E1E1E!important;background:rgba(255,255,255,.78)!important}
body.dark .ruleLabel{color:#F0E4CC!important;background:rgba(0,0,0,.45)!important}
input[type="range"]{accent-color:var(--accent)}


/* V29.1 — icônes Apple uniformisées */
.emojiIcon{
  display:inline-flex;align-items:center;justify-content:center;width:1.45em;
  filter: grayscale(1) brightness(0) contrast(1.4) !important;
  opacity:.98;vertical-align:-.12em;margin-right:.15em;
}
button .emojiIcon{filter:grayscale(1) brightness(0) contrast(1.4) !important;}
body.dark .emojiIcon{filter: grayscale(1) sepia(1) saturate(.35) hue-rotate(355deg) brightness(1.45) contrast(1.05) !important;}
/* Règle: opacité fonctionnelle de 10 % à 100 % par JS, sans opacité globale */
.rule{opacity:1!important;}



/* ===== V30 — TOUTES les icônes harmonisées ===== */
:root{--iconLight:#1E1E1E;--iconDark:#F0E4CC;}
/* Les emojis Apple gardent leur forme, mais sont convertis visuellement en monochrome. */
.emojiIcon,.autoEmojiIcon{
  display:inline-flex;align-items:center;justify-content:center;
  width:1.45em;margin-right:.15em;vertical-align:-.12em;
  filter: grayscale(1) brightness(0) contrast(1.7) !important;
  opacity:1 !important;
}
body.dark .emojiIcon,body.dark .autoEmojiIcon{
  filter: grayscale(1) sepia(1) saturate(.35) hue-rotate(355deg) brightness(1.55) contrast(1.05) !important;
}
/* SVG/icônes dessinées */
.icon,svg,[class*="icon"]{color:var(--iconLight)!important;stroke:var(--iconLight)!important;}
body.dark .icon,body.dark svg,body.dark [class*="icon"]{color:var(--iconDark)!important;stroke:var(--iconDark)!important;}
/* Règle: le JS ajuste bien 10 à 100 %, sans opacité globale. */
.rule{opacity:1!important;}



/* ===== V30 : icônes vectorielles monochromes, sans emojis couleur ===== */
:root{--iconLight:#1E1E1E;--iconDark:#F0E4CC;}
.sficon{display:inline-block;width:1.13em;height:1.13em;margin-right:.38em;vertical-align:-.18em;background:var(--iconLight)!important;mask-size:contain;mask-position:center;mask-repeat:no-repeat;-webkit-mask-size:contain;-webkit-mask-position:center;-webkit-mask-repeat:no-repeat;filter:none!important;flex:0 0 auto;}
body.dark .sficon{background:var(--iconDark)!important;}
button .sficon{background:var(--iconLight)!important;}
body.dark button .sficon{background:var(--iconDark)!important;}
button:not(.secondary):not(.ghost):not(.danger) .sficon, button.danger .sficon{background:#1E1E1E!important;}
body.dark button:not(.secondary):not(.ghost):not(.danger) .sficon, body.dark button.danger .sficon{background:#F0E4CC!important;}
.emojiIcon,.autoEmojiIcon{display:none!important;}
.themeBtn .sficon{margin-right:.18em;margin-left:.18em;}

<body>
<div class="app">
<header class="topbar">
<button id="toggleSide" class="secondary"><span class="sficon sf-lightbulb" aria-hidden="true"></span>Projets</button>
<div class="title"><span class="logoYarn" aria-hidden="true"></span>Suivi Tricot V34</div>
<div class="spacer"></div>
<button id="themeToggle" class="secondary themeBtn" title="Mode clair/sombre"><span class="sficon sf-sun" aria-hidden="true"></span><span class="sficon sf-moon" aria-hidden="true"></span></button>
<button id="toggleAccessories" class="secondary"><span class="sficon sf-gear" aria-hidden="true"></span>Accessoires</button>
</header>
<div id="layout" class="layout">
<aside id="sidebar" class="sidebar">
<div class="card"><h2><span class="sficon sf-lightbulb" aria-hidden="true"></span>Projets / patrons</h2><label>Projet à travailler :<select id="projectSelect"></select></label><div class="row"><button id="newProject"><span class="sficon sf-lightbulb" aria-hidden="true"></span>Nouveau projet/patron</button></div><div class="row"><button id="renameProject" class="secondary"><span class="sficon sf-pen" aria-hidden="true"></span>Renommer</button><button id="deleteProject" class="danger"><span class="sficon sf-trash" aria-hidden="true"></span>Supprimer</button></div>
<div class="row"><button id="saveCurrentProject" class="secondary"><span class="sficon sf-save" aria-hidden="true"></span>Sauvegarder ce projet</button></div>
<div class="row"><button id="openBackup" class="secondary"><span class="sficon sf-folder" aria-hidden="true"></span>Ouvrir / restaurer</button></div>
<div class="row"><button id="diagnosticPdf" class="secondary"><span class="sficon sf-check" aria-hidden="true"></span>Vérifier PDF</button></div>
<input type="file" id="backupInput" accept=".json,.stk,application/json" style="display:none">
</div>
<div class="card stickyCounter"><h2><span class="sficon sf-counter" aria-hidden="true"></span>Compteurs de rang</h2><div id="counters"></div><button id="addCounter"><span class="sficon sf-counter" aria-hidden="true"></span>Ajouter un compteur</button></div>
<div class="card"><h2><span class="sficon sf-doc" aria-hidden="true"></span>Patron PDF</h2><input type="file" id="pdfInput2" accept="application/pdf,.pdf"><div class="row"><button id="prevPage" class="secondary">← Page</button><button id="nextPage" class="secondary">Page →</button></div><div class="row"><button id="zoomOut" class="secondary">− Zoom</button><button id="zoomIn" class="secondary">+ Zoom</button></div><div class="row"><button id="fitWidth" class="secondary">Largeur</button><button id="fitPage" class="secondary">Page entière</button></div><p id="pageInfo" class="hint">Aucun PDF importé.</p><label>Transparence règle couleur bouton (10% à 100%)<input type="range" id="ruleOpacity" min="10" max="100" value="42"></label><div class="row"><button id="lockRule" class="secondary"><span class="sficon sf-lock" aria-hidden="true"></span>Verrouiller règle</button></div><div class="row"><button id="resetArrow" class="secondary">▲ Centrer flèche</button></div></div>
<div class="card"><h2><span class="sficon sf-pen" aria-hidden="true"></span>Tailles à souligner</h2><div class="row"><button id="manualHighlightToggle" class="secondary"><span class="sficon sf-pen" aria-hidden="true"></span>Souligner</button></div><div class="row"><button id="undoManualHighlight" class="secondary"><span class="sficon sf-undo" aria-hidden="true"></span>Annuler</button><button id="clearPageHighlights" class="danger"><span class="sficon sf-eraser" aria-hidden="true"></span>Effacer page</button></div><p id="manualHighlightStatus" class="hint">Désactivé.</p></div>
<div class="card"><h2><span class="sficon sf-pen" aria-hidden="true"></span>Notes</h2><textarea id="notes" placeholder="Notes du projet..."></textarea></div>
</aside>
<main class="viewer" id="viewer"><div class="pdfwrap" id="pdfwrap"><div class="empty"><h2>Importe un patron PDF</h2></div><div id="rule" class="rule"></div></div></main>
</div>
<aside id="accessoriesDrawer" class="drawer">
<div class="card"><h2><span class="sficon sf-calendar" aria-hidden="true"></span>Projet</h2><label>Date de début :<input type="date" id="startDate"></label><br><br><label>Date de fin :<input type="date" id="endDate"></label><br><br><div id="duration" class="dur">Aucune date sélectionnée</div></div>
<div class="card"><h2><span class="sficon sf-link" aria-hidden="true"></span>Combinaisons choisies</h2><p class="hint">Indique seulement les combinaisons réellement utilisées pour ce patron.</p><label>Nom / ensemble :<input id="comboName" placeholder="Ex: Interchangeables 3"></label><div class="row"><label>Grosseur :<select id="comboNeedle"></select></label><label>Câble :<select id="comboCable"></select></label></div><div class="row"><label>Type :<select id="comboType"></select></label><label>Longueur aiguilles :<select id="comboLength"></select></label></div><label>Note :<input id="comboNote" placeholder="Ex: manches, corps, col..."></label><button id="addCombo"><span class="sficon sf-link" aria-hidden="true"></span>Ajouter la combinaison</button><div id="comboList"></div></div>
<div style="display:none"><div id="needleTypesBox"></div><div id="needleSizesBox"></div><div id="needleLengthsBox"></div><div id="cables"></div></div>
<div class="card"><h2><span class="sficon sf-scissors" aria-hidden="true"></span>Outils</h2><div id="tools"></div></div>
<div class="card"><h2><span class="sficon sf-yarn" aria-hidden="true"></span>Laine</h2><div id="yarnFieldsBox"></div></div>
</aside>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const VERSION='Suivi Tricot V34 Luxe', KEY='suivi-tricot-v15-data', OLDKEYS=['suivi-tricot-v16-data','suivi-tricot-v15-data','suivi-tricot-v14-data','suivi-tricot-v13-data','suivi-tricot-v12-data','suivi-tricot-v11-data','suivi-tricot-v10-data','suivi-tricot-v9-data'];
const needleTypesList=['Interchangeables','Circulaires à câble fixe','Double pointes','Droites'];
const needleSizesList=['1.00 mm — pas de taille US','1.25 mm — pas de taille US','1.50 mm — taille US 000','1.75 mm — pas de taille US','2.00 mm — taille US 0','2.25 mm — taille US 1','2.50 mm — pas de taille US','2.75 mm — taille US 2','3.00 mm — pas de taille US','3.25 mm — taille US 3','3.50 mm — taille US 4','3.75 mm — taille US 5','4.00 mm — taille US 6','4.25 mm — taille US 7','4.50 mm — taille US 7','5.00 mm — taille US 8','5.50 mm — taille US 9','6.00 mm — taille US 10','6.50 mm — taille US 10.5','7.00 mm — pas de taille US','7.50 mm — pas de taille US','8.00 mm — taille US 11','9.00 mm — taille US 13','10.00 mm — taille US 15','11.00 mm — taille US 13 ou 17','12.00 mm — pas de taille US','12.50 mm — taille US 17','15.00 mm — taille US 19'];
const needleLengthsList=['2 po (5 cm)','3 po (8 cm)','4 po (10 cm)','5 po (13 cm)','6 po (15 cm)','8 po (20 cm)','10 po (25 cm)','13 po (33 cm)','14 po (35 cm)'];
const cableList=['5 po (13 cm)','6 po (15 cm)','8 po (20 cm)','9 po (23 cm)','12 po (30 cm)','14 po (35 cm)','16 po (40 cm)','22 po (56 cm)','24 po (60 cm)','30 po (76 cm)','32 po (80 cm)','37 po (94 cm)','40 po (100 cm)','47 po (120 cm)','50 po (125 cm)','60 po (150 cm)'];
const baseTools=['Marqueurs de mailles','Ciseaux','Aiguille à tapisserie','Ruban à mesurer','Autre'];
const yarnWeights=['0- Dentelle - Lace','1- Fingering - Super fin','2- Sport - Fine','3- DK - Léger','4- Worsted - Moyen','5- Bulky - Chunky','6- Super Bulky - Très épais','7- Jumbo - Ruban à filer'];
let data=load(), currentId=data.currentId, pdfDoc=null, pageNum=1, scale=1.15, pdfBytes=null;
function uid(){return 'p'+Date.now()+Math.random().toString(16).slice(2)}
function defaultProject(name='Nouveau projet'){return {id:uid(),name,pdfName:'',pdfData:'',page:1,scale:1.15,ruleTop:120,ruleArrowLeft:50,ruleOpacity:42,ruleLocked:false,counters:[{name:'Corps',value:0}],notes:'',startDate:'',endDate:'',sizeLabel:'',sizePosition:'4',highlightColor:'manualPink',manualHighlightMode:false,manualHighlights:{},checks:{},customTools:[],yarn:{},combos:[]}}
function normalizeProject(pr){let d=defaultProject(pr?.name||'Projet');return Object.assign(d,pr,{pdfData:pr?.pdfData||'',checks:pr?.checks||{},customTools:pr?.customTools||[],yarn:pr?.yarn||{},combos:pr?.combos||[]})}
function load(){for(const k of [KEY,...OLDKEYS]){try{let d=JSON.parse(localStorage.getItem(k));if(d&&d.projects?.length){d.projects=d.projects.map(normalizeProject);if(!d.currentId||!d.projects.some(p=>p.id===d.currentId))d.currentId=d.projects[0].id;localStorage.setItem(KEY,JSON.stringify(d));return d}}catch(e){}}let p=defaultProject('Nouveau patron');return {currentId:p.id,projects:[p]}}
function save(){
  if(!data.projects.some(pr=>pr.id===currentId)&&data.projects.length)currentId=data.projects[0].id;
  data.currentId=currentId;
  // V15 : les PDF volumineux sont gardés dans IndexedDB, pas dans localStorage.
  // Cela évite que Safari/Chrome efface le PDF à cause de la limite de stockage texte.
  const light=JSON.parse(JSON.stringify(data));
  light.projects.forEach(pr=>{ if(pr.pdfData) pr.pdfData=''; });
  try{localStorage.setItem(KEY,JSON.stringify(light))}
  catch(e){alert('Impossible de sauvegarder les informations du projet. Essaie de libérer un peu d’espace sur l’iPad.');}
}
function p(){return data.projects.find(x=>x.id===currentId)||data.projects[0]}
function checkKey(prefix,val){return prefix+'|'+val}
function allNeedles(){return needleSizesList.map(n=>n.split(' — ')[0])}
function allCables(){return cableList}
function renderProjects(){if(!window.projectSelect)return;projectSelect.innerHTML='';data.projects.forEach(pr=>{let opt=document.createElement('option');opt.value=pr.id;let hasPdf=!!(pr.pdfName||pr.pdfData);opt.textContent=(hasPdf?'□ ':'△ ')+pr.name+(hasPdf?' — PDF présent':' — aucun PDF');projectSelect.appendChild(opt)});projectSelect.value=currentId;projectSelect.onchange=e=>{currentId=e.target.value;save();loadProject()}}
function renderCheckList(container,items,prefix){container.innerHTML='';items.forEach(label=>{let k=checkKey(prefix,label);let lab=document.createElement('label');lab.className='check';lab.innerHTML=`<input type="checkbox" ${p().checks[k]?'checked':''}> <span>${label}</span>`;lab.querySelector('input').onchange=e=>{p().checks[k]=e.target.checked;save()};container.appendChild(lab)})}

function arrayBufferToBase64(buffer){let binary='', bytes=new Uint8Array(buffer), chunk=0x8000; for(let i=0;i<bytes.length;i+=chunk){binary+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));} return btoa(binary)}

// V16 — stockage robuste des PDF par projet dans IndexedDB.
// Important sur iPad : l’application Web ne peut pas relire automatiquement un fichier placé dans iCloud Drive.
// Il faut choisir le fichier .stk avec “Ouvrir / restaurer”. Une fois restauré/importé, le PDF est copié ici.
const PDF_DB='suivi_tricot_pdf_db_v16';
const PDF_STORE='pdfs';
function openPdfDB(){
  return new Promise((resolve,reject)=>{
    if(!('indexedDB' in window)){reject(new Error('IndexedDB non disponible'));return;}
    const req=indexedDB.open(PDF_DB,1);
    req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(PDF_STORE))db.createObjectStore(PDF_STORE,{keyPath:'id'});};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error||new Error('Erreur IndexedDB'));
  });
}
async function putProjectPdf(projectId, base64, name){
  if(!projectId||!base64)return;
  const db=await openPdfDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(PDF_STORE,'readwrite');
    tx.objectStore(PDF_STORE).put({id:projectId,pdfData:base64,pdfName:name||'',updatedAt:new Date().toISOString()});
    tx.oncomplete=()=>{db.close();resolve(true)};
    tx.onerror=()=>{db.close();reject(tx.error||new Error('Erreur sauvegarde PDF'))};
  });
}
async function getProjectPdf(projectId){
  if(!projectId)return '';
  try{
    const db=await openPdfDB();
    return await new Promise((resolve,reject)=>{
      const tx=db.transaction(PDF_STORE,'readonly');
      const req=tx.objectStore(PDF_STORE).get(projectId);
      req.onsuccess=()=>resolve((req.result&&req.result.pdfData)||'');
      req.onerror=()=>reject(req.error||new Error('Erreur lecture PDF'));
      tx.oncomplete=()=>db.close();
    });
  }catch(e){console.warn(e);return '';}
}
async function deleteProjectPdf(projectId){
  try{
    const db=await openPdfDB();
    return await new Promise((resolve,reject)=>{
      const tx=db.transaction(PDF_STORE,'readwrite');
      tx.objectStore(PDF_STORE).delete(projectId);
      tx.oncomplete=()=>{db.close();resolve(true)};
      tx.onerror=()=>{db.close();reject(tx.error||new Error('Erreur suppression PDF'))};
    });
  }catch(e){console.warn(e);}
}
async function attachPdfData(project){
  const copy=JSON.parse(JSON.stringify(project));
  copy.pdfData=copy.pdfData||await getProjectPdf(copy.id)||'';
  return copy;

async function loadPdfFromFile(file){
  if(!file)return;
  pdfBytes=await file.arrayBuffer();
  let pr=p();
  const b64=arrayBufferToBase64(pdfBytes);
  pr.pdfData='';
  pr.pdfName=file.name;
  pr.page=1;
  try{await putProjectPdf(pr.id,b64,pr.pdfName);}catch(e){alert('Le PDF n’a pas pu être sauvegardé dans le stockage de l’iPad. Il restera visible pour l’instant, mais il faudra peut-être le réimporter plus tard.');}
  pdfDoc=await pdfjsLib.getDocument({data:pdfBytes.slice(0)}).promise;
  save();
  renderPage();
}

function undoManualHighlight(){
  const pr=p(); if(!pr.manualHighlights) return;
  let bestKey=null,bestIndex=-1,bestTime=-1;
  Object.keys(pr.manualHighlights).forEach(key=>{
    const arr=Array.isArray(pr.manualHighlights[key])?pr.manualHighlights[key]:[];
    arr.forEach((h,i)=>{
      const t=Number(h.createdAt||0);
      if(t>bestTime){bestTime=t;bestKey=key;bestIndex=i;}
    });
  });
  // Compatibilité avec les anciens soulignements sans date : annule d'abord sur la page courante.
  if(bestIndex<0){
    const cur=getPageHighlights();
    if(cur.length){cur.pop(); save(); renderManualHighlights();}
    return;
  }
  pr.manualHighlights[bestKey].splice(bestIndex,1);
  save(); renderManualHighlights();
}

async function renderPage(){if(!pdfDoc)return;let pr=p();pageNum=pr.page||1;scale=pr.scale||1.15;pdfwrap.innerHTML='<div id="rule" class="rule"><div id="ruleArrow" class="ruleArrow"></div><div class="ruleLabel">ligne</div></div>';window.rule=document.getElementById('rule');bindRule();let page=await pdfDoc.getPage(pageNum);let viewport=page.getViewport({scale});let canvas=document.createElement('canvas');canvas.className='pdfcanvas';canvas.width=viewport.width;canvas.height=viewport.height;pdfwrap.style.width=viewport.width+'px';pdfwrap.style.height=viewport.height+'px';pdfwrap.appendChild(canvas);await page.render({canvasContext:canvas.getContext('2d'),viewport}).promise;await renderTextLayer(page,viewport);ensureManualOverlay();renderManualHighlights();pdfwrap.appendChild(rule);renderAll();pageInfo.textContent=`${pr.pdfName||'PDF'} — page ${pageNum} / ${pdfDoc.numPages}`}
async function renderTextLayer(page,viewport){
  const text=await page.getTextContent();
  const layer=document.createElement('div');
  layer.className='textLayer';
  layer.style.width=viewport.width+'px';
  layer.style.height=viewport.height+'px';

  const wantedIndex=Math.max(0,Number(p().sizePosition||1)-1);
  const wantedLabel=(p().sizeLabel||'').trim().toLowerCase();
  const color=p().highlightColor||'yellow';
  const rows=[];

  function tokenRegex(){return /[0-9]+(?:[.,][0-9]+)?\s*(?:xl|XL)?|[A-Za-zÀ-ÿ]+(?:[0-9]+)?/g;}
  function normalizeToken(v){return String(v||'').toLowerCase().replace(/\s+/g,'').replace(',', '.');}
  function addRowItem(item){
    const str=item.str||'';
    if(!str.trim())return;
    const tx=pdfjsLib.Util.transform(viewport.transform,item.transform);
    const fontSize=Math.abs(tx[3])||12;
    const width=(item.width?item.width*scale:fontSize*str.length*.55);
    const obj={str,x:tx[4],y:tx[5]-fontSize,fontSize,width,charW:width/Math.max(str.length,1)};
    let row=rows.find(r=>Math.abs(r.y-obj.y)<Math.max(4,fontSize*.45));
    if(!row){row={y:obj.y,fontSize,items:[]};rows.push(row)}
    row.items.push(obj);
  }
  function drawBaseAndCollect(){
    text.items.forEach(item=>{
      const str=item.str||'';
      if(!str)return;
      const tx=pdfjsLib.Util.transform(viewport.transform,item.transform);
      const fontSize=Math.abs(tx[3])||12;
      const base=document.createElement('span');
      base.textContent=str;
      base.style.left=tx[4]+'px';
      base.style.top=(tx[5]-fontSize)+'px';
      base.style.fontSize=fontSize+'px';
      layer.appendChild(base);
      addRowItem(item);
    });
  }
  function buildLine(row){
    row.items.sort((a,b)=>a.x-b.x);
    let full='', map=[];
    row.items.forEach((it,idx)=>{
      if(idx>0){
        const prev=row.items[idx-1];
        const gap=it.x-(prev.x+prev.width);
        const spaces=Math.max(1,Math.min(6,Math.round(gap/Math.max(3,it.fontSize*.35))));
        for(let s=0;s<spaces;s++){map.push({x:prev.x+prev.width+(gap*(s+1)/(spaces+1)),y:it.y,fontSize:it.fontSize,width:it.fontSize*.28,space:true});full+=' ';}
      }
      for(let i=0;i<it.str.length;i++){
        map.push({x:it.x+it.charW*i,y:it.y,fontSize:it.fontSize,width:Math.max(it.charW,it.fontSize*.28)});
        full+=it.str[i];
      }
    });
    return {full,map};
  }
  function addHighlight(map,start,end){
    if(start<0||end<=start||!map[start])return;
    const chars=map.slice(start,end).filter(c=>!c.space);
    if(!chars.length)return;
    const left=Math.min(...chars.map(c=>c.x));
    const right=Math.max(...chars.map(c=>c.x+c.width));
    const top=Math.min(...chars.map(c=>c.y));
    const fs=Math.max(...chars.map(c=>c.fontSize));
    const hl=document.createElement('span');
    hl.className='hl';
    hl.textContent=' '.repeat(Math.max(1,end-start));
    hl.style.left=left+'px';
    hl.style.top=top+'px';
    hl.style.fontSize=fs+'px';
    hl.style.width=Math.max(right-left,fs*.8)+'px';
    hl.style.height=(fs*1.08)+'px';
    hl.style.background=color;
    layer.appendChild(hl);
  }
  function tokenMatchesLabel(tok){
    if(!wantedLabel)return false;
    const t=normalizeToken(tok);
    const w=normalizeToken(wantedLabel);
    if(!w)return false;
    return t===w;
  }
  function highlightLine(line,map){
    const full=line;
    const ranges=[];

    // Mode principal V19 : repérer une série de tailles/valeurs sous la forme
    // valeur (valeur, valeur, valeur) (valeur, valeur...), puis surligner uniquement
    // la valeur à la position choisie. Exemple : XS (S, M, L, XL) (1XL, 2XL)
    const parenRun=/\([^()]+\)(?:\s*\([^()]+\))*/g;
    let run;
    while((run=parenRun.exec(full))!==null){
      const runStart=run.index;
      const runEnd=run.index+run[0].length;
      const before=full.slice(0,runStart);
      const pre=[...before.matchAll(tokenRegex())].pop();
      let tokens=[];
      if(pre && runStart-(pre.index+pre[0].length)<=8){tokens.push({text:pre[0],start:pre.index,end:pre.index+pre[0].length});}
      const inside=full.slice(runStart,runEnd);
      for(const m of inside.matchAll(tokenRegex()))tokens.push({text:m[0],start:runStart+m.index,end:runStart+m.index+m[0].length});
      const chosen=tokens[wantedIndex];
      if(chosen)ranges.push(chosen);
    }

    // Secours : si un libellé exact est entré (ex. L ou 4XL), on le souligne seulement
    // comme mot complet, jamais comme simple lettre dans une phrase.
    if(wantedLabel){
      for(const m of full.matchAll(tokenRegex())){
        if(tokenMatchesLabel(m[0]))ranges.push({text:m[0],start:m.index,end:m.index+m[0].length});
      }
    }

    // Éviter les doublons superposés.
    const seen=new Set();
    ranges.forEach(r=>{const key=r.start+'-'+r.end; if(!seen.has(key)){seen.add(key); addHighlight(map,r.start,r.end);}});
  }

  drawBaseAndCollect();
  rows.forEach(row=>{
    const {full,map}=buildLine(row);
    // Surlignage automatique retiré en V21 : les tailles se soulignent manuellement.
    // highlightLine(full,map);
  });
  pdfwrap.appendChild(layer);
}

function bindRule(){if(!window.rule)return;let dragging=false,dragArrow=false,offset=0;let arrow=document.getElementById('ruleArrow');rule.onpointerdown=e=>{if(e.target===arrow)return;dragging=true;offset=e.clientY-rule.offsetTop;rule.setPointerCapture(e.pointerId)};rule.onpointermove=e=>{if(!dragging)return;let y=e.clientY-pdfwrap.getBoundingClientRect().top-offset;y=Math.max(0,Math.min(pdfwrap.clientHeight-34,y));rule.style.top=y+'px';p().ruleTop=y;save()};rule.onpointerup=()=>dragging=false;if(arrow){arrow.onpointerdown=e=>{dragArrow=true;e.stopPropagation();arrow.setPointerCapture(e.pointerId)};arrow.onpointermove=e=>{if(!dragArrow)return;let r=rule.getBoundingClientRect();let pct=((e.clientX-r.left)/r.width)*100;pct=Math.max(0,Math.min(100,pct));arrow.style.left=pct+'%';p().ruleArrowLeft=pct;save()};arrow.onpointerup=()=>dragArrow=false}}
async function loadProject(){

  downloadJson({app:'Suivi Tricot',version:VERSION,type:'project',exportedAt:new Date().toISOString(),project:pr}, safeFileName(pr.name)+'.stk');
}
function importBackupFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const obj=JSON.parse(reader.result);
      if(obj.type==='project'&&obj.project){
        const imported=normalizeProject(obj.project);
        const incomingPdf=imported.pdfData||'';
        imported.pdfData='';
        imported.id=uid();
        let base=imported.name||'Projet importé';
        imported.name=base;
        // Évite deux projets avec le même nom dans la liste.
        if(data.projects.some(pr=>pr.name===imported.name)) imported.name=base+' (importé)';
        data.projects.push(imported);
        currentId=imported.id;
        if(incomingPdf) await putProjectPdf(imported.id,incomingPdf);
        save();
        alert('Projet restauré : '+imported.name+(incomingPdf?' avec son PDF.':' sans PDF.'));
        loadProject();
      }else if(obj.type==='backup'||(obj.data&&Array.isArray(obj.data.projects))||Array.isArray(obj.projects)){
        alert('V17 restaure seulement un projet à la fois. Ouvre plutôt le fichier .stk du projet voulu, par exemple Raglan Patrick.stk.');
      }else{
        alert('Ce fichier ne semble pas être une sauvegarde de projet Suivi Tricot valide.');
      }
    }catch(e){console.error(e);alert('Impossible de lire la sauvegarde. Le fichier est peut-être invalide.');}
    backupInput.value='';
  };
  reader.readAsText(file);
}

prevPage.onclick=()=>{if(pdfDoc&&p().page>1){p().page--;save();renderPage()}};nextPage.onclick=()=>{if(pdfDoc&&p().page<pdfDoc.numPages){p().page++;save();renderPage()}};zoomIn.onclick=()=>{p().scale=(p().scale||1.15)+.15;save();renderPage()};zoomOut.onclick=()=>{p().scale=Math.max(.45,(p().scale||1.15)-.15);save();renderPage()};fitWidth.onclick=()=>{if(!pdfDoc)return;p().scale=Math.max(.5,(viewer.clientWidth-40)/600);save();renderPage()};fitPage.onclick=()=>{if(!pdfDoc)return;p().scale=.9;save();renderPage()};
toggleSide.onclick=()=>{
  sidebar.classList.toggle('closed');

ruleOpacity.oninput=e=>{p().ruleOpacity=Math.max(10,Math.min(100,parseInt(e.target.value,10)||42));save();applyRuleStyle();};lockRule.onclick=()=>{p().ruleLocked=!p().ruleLocked;save();renderAll()};
addCounter.onclick=()=>{p().counters.push({name:'Nouveau compteur',value:0});save();renderCounters()};notes.oninput=e=>{p().notes=e.target.value;save()};

[startDate,endDate].forEach(el=>el.oninput=e=>{p()[el.id]=e.target.value;save();updateDuration();});
if(window.resetArrow)resetArrow.onclick=()=>{p().ruleArrowLeft=50;save();renderAll()};

<script>(function(){
  const emojiRE=/([\u2600-\u27BF]|[\uD83C-\uDBFF][\uDC00-\uDFFF])(?:\uFE0F|[\uD83C][\uDFFB-\uDFFF])?/g;
  function shouldSkip(node){
    const p=node.parentElement;
    if(!p) return true;
    return p.closest('script,style,textarea,input,select,.emojiIcon,.autoEmojiIcon,.textLayer,.pdfcanvas');
  }
  function wrapTextNode(node){
    const text=node.nodeValue;
    if(!emojiRE.test(text)) return;
    emojiRE.lastIndex=0;
    const frag=document.createDocumentFragment();
    let last=0,m;
    while((m=emojiRE.exec(text))){
      if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));
      const sp=document.createElement('span');
      sp.className='autoEmojiIcon';
      sp.setAttribute('aria-hidden','true');
      sp.textContent=m[0];
      frag.appendChild(sp);
      last=m.index+m[0].length;
    }
    if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag,node);
  }
  function harmonizeIcons(root=document.body){
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(n){return shouldSkip(n)?NodeFilter.FILTER_REJECT:NodeFilter.FILTER_ACCEPT;}});
    const nodes=[]; let n;
    while(n=walker.nextNode()) nodes.push(n);
    nodes.forEach(wrapTextNode);
  }
  document.addEventListener('DOMContentLoaded',()=>{
    harmonizeIcons();
    const obs=new MutationObserver(muts=>{
      for(const mut of muts){
        mut.addedNodes.forEach(node=>{
          if(node.nodeType===Node.TEXT_NODE && !shouldSkip(node)) wrapTextNode(node);
          else if(node.nodeType===Node.ELEMENT_NODE && !node.matches('script,style,textarea,input,select,.textLayer')) harmonizeIcons(node);
        });
      }
    });
    obs.observe(document.body,{childList:true,subtree:true});
  });
})();
</script>
