ight:650;text-align:center}.rightbar.collapsed,.sidebar.collapsed{display:none}.layout.leftHidden{grid-template-columns:1fr var(--right)}.layout.rightHidden{grid-template-columns:var(--side) 1fr}.layout.leftHidden.rightHidden{grid-template-columns:1fr}.miniNav{display:none}.accessList{display:flex;flex-direction:column;gap:8px}.combo{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px;font-size:14px}.status{font-size:12px;color:var(--muted);padding-top:6px}.tabIcon{width:36px;height:36px;object-fit:cover;border-radius:9px}.topLogoText{display:flex;align-items:center;gap:12px;margin-right:auto}@media(max-width:900px){.top{height:auto;flex-wrap:wrap}.title{font-size:24px}.layout{grid-template-columns:1fr;padding:8px}.sidebar,.rightbar{position:absolute;top:86px;bottom:10px;width:min(88vw,330px);z-index:20}.sidebar{left:8px}.rightbar{right:8px}.sidebar.collapsed,.rightbar.collapsed{display:none}.layout,.layout.leftHidden,.layout.rightHidden,.layout.leftHidden.rightHidden{grid-template-columns:1fr}.miniNav{display:flex}.viewerCard{grid-column:1}.logo{width:44px;height:44px}}@media(orientation:portrait){.title{font-size:22px}.iconbtn{height:44px;min-width:44px}.toolbar{flex-wrap:wrap}.bottom{flex-wrap:wrap}}

<script>
if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}
const $=id=>document.getElementById(id); const storeKey='suiviTricotV23';
let state={theme:'light',active:null,projects:{}}; let pdfDoc=null, pdfPage=null, drawing=false, startPt=null;
function uid(){return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function blankProject(name='Nouveau projet'){return {id:uid(),name,pdfName:'',pdfData:null,page:1,scale:1.2,rulerY:130,arrowX:.5,rulerVisible:true,rulerOpacity:45,counters:[{name:'Compteur',value:0}],activeCounter:0,notes:'',marks:{},dates:{start:'',end:''},combos:[],yarn:{}}}
function save(){localStorage.setItem(storeKey,JSON.stringify(state))}
function load(){try{state=JSON.parse(localStorage.getItem(storeKey))||state}catch(e){} if(!state.projects||!Object.keys(state.projects).length){const p=blankProject('Mon projet');state.projects[p.id]=p;state.active=p.id} if(!state.active)state.active=Object.keys(state.projects)[0]; applyTheme()}
function current(){return state.projects[state.active]}
function renderProjects(){const sel=$('projectSelect');sel.innerHTML='';Object.values(state.projects).forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=(p.pdfData?'📄 ':'⚠ ')+p.name;sel.appendChild(o)});sel.value=state.active; $('pdfStatus').textContent=current().pdfData?'PDF présent : '+(current().pdfName||'patron.pdf'):'Aucun PDF'}
function renderForm(){const p=current(); renderProjects(); $('notes').value=p.notes||''; $('startDate').value=p.dates?.start||''; $('endDate').value=p.dates?.end||''; $('opacityRange').value=p.rulerOpacity||45; $('opacityVal').textContent=(p.rulerOpacity||45)+'%'; setRulerStyle(); renderCounters(); renderCombos(); ['yarnBrand','yarnName','yarnColor','yarnFiber','yarnMeters','yarnBalls','yarnPrice','gauge'].forEach(id=>$(id).value=(p.yarn||{})[id]||''); calcDuration(); loadPdfFromProject()}
function renderCounters(){const p=current(); const sel=$('counterSelect');sel.innerHTML='';p.counters.forEach((c,i)=>{let o=document.createElement('option');o.value=i;o.textContent=c.name;sel.appendChild(o)});p.activeCounter=Math.min(p.activeCounter||0,p.counters.length-1);sel.value=p.activeCounter; const c=p.counters[p.activeCounter];$('counterName').value=c.name;$('countDigits').textContent=String(c.value).padStart(4,'0')}
function renderCombos(){const p=current();const list=$('comboList');list.innerHTML='';(p.combos||[]).forEach((t,i)=>{const d=document.createElement('div');d.className='combo';d.innerHTML='<div class="row"><span style="flex:1">'+escapeHtml(t)+'</span><button class="iconbtn small" data-i="'+i+'">×</button></div>';list.appendChild(d)});list.querySelectorAll('button').forEach(b=>b.onclick=()=>{p.combos.splice(+b.dataset.i,1);save();renderCombos()})}
function escapeHtml(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function applyTheme(){document.body.classList.toggle('dark',state.theme==='dark');$('themeBtn').textContent=state.theme==='dark'?'☀':'☾'}
async function loadPdfFromProject(){const p=current();pdfDoc=null;$('placeholder').style.display=p.pdfData?'none':'flex';$('pdfCanvas').style.display=p.pdfData?'block':'none';$('ruler').style.display=p.pdfData&&p.rulerVisible?'block':'none';$('arrow').style.display=p.pdfData&&p.rulerVisible?'block':'none'; if(!p.pdfData){$('pageNum').textContent='0';$('pageTotal').textContent='0';$('highlightLayer').innerHTML='';return} try{const bin=atob(p.pdfData.split(',')[1]||p.pdfData);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);pdfDoc=await pdfjsLib.getDocument({data:bytes}).promise;p.page=Math.min(Math.max(p.page||1,1),pdfDoc.numPages);await renderPage()}catch(e){console.error(e);$('placeholder').style.display='flex';$('placeholder').textContent='PDF non chargé. Restaurer/importer à nouveau.'}}
async function renderPage(){if(!pdfDoc)return;const p=current();pdfPage=await pdfDoc.getPage(p.page);const viewport=pdfPage.getViewport({scale:p.scale||1.2});const canvas=$('pdfCanvas'),ctx=canvas.getContext('2d');canvas.width=viewport.width;canvas.height=viewport.height;await pdfPage.render({canvasContext:ctx,viewport}).promise;$('pageNum').textContent=p.page;$('pageTotal').textContent=pdfDoc.numPages;$('pdfStage').style.width=canvas.width+'px';$('pdfStage').style.height=canvas.height+'px';setRulerStyle();renderMarks()}
function setRulerStyle(){const p=current();const r=$('ruler'),a=$('arrow');r.style.top=(p.rulerY||130)+'px';r.style.background=`color-mix(in srgb, var(--accent) ${p.rulerOpacity||45}%, transparent)`;a.style.left=((p.arrowX||.5)*100)+'%'}
function renderMarks(){const p=current();const layer=$('highlightLayer');layer.innerHTML='';const arr=(p.marks&&p.marks[p.page])||[];arr.forEach(m=>{const d=document.createElement('div');d.className='mark';d.style.left=m.x+'px';d.style.top=m.y+'px';d.style.width=m.w+'px';layer.appendChild(d)})}
function saveFile(name,data){const blob=new Blob([JSON.stringify(data)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name.replace(/[^a-z0-9_ -]/gi,'_')+'.stk';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function calcDuration(){const p=current();let t='';if(p.dates?.start){const s=new Date(p.dates.start+'T00:00:00');const e=p.dates.end?new Date(p.dates.end+'T00:00:00'):new Date();const days=Math.max(0,Math.round((e-s)/86400000));t=p.dates.end?'Terminé en '+days+' jours':'En cours depuis '+days+' jours'}$('duration').textContent=t}
function wire(){['toggleLeft','toggleRight'].forEach(id=>$(id).onclick=()=>{const left=id==='toggleLeft';$(left?'leftPanel':'rightPanel').classList.toggle('collapsed');$('layout').classList.toggle(left?'leftHidden':'rightHidden')});$('themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';applyTheme();save()};$('projectSelect').onchange=e=>{state.active=e.target.value;save();renderForm()};$('newProject').onclick=()=>{const name=prompt('Nom du projet')||'Nouveau projet';const p=blankProject(name);state.projects[p.id]=p;state.active=p.id;save();renderForm()};$('renameProject').onclick=()=>{const p=current();const n=prompt('Nouveau nom',p.name);if(n){p.name=n;save();renderProjects()}};$('deleteProject').onclick=()=>{if(Object.keys(state.projects).length<2)return alert('Garde au moins un projet.');if(confirm('Supprimer ce projet?')){delete state.projects[state.active];state.active=Object.keys(state.projects)[0];save();renderForm()}};
$('pdfInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{const p=current();p.pdfName=f.name;p.pdfData=rd.result;p.page=1;p.scale=1.2;p.marks={};save();renderForm()};rd.readAsDataURL(f)};
$('prevPage').onclick=()=>{const p=current();if(pdfDoc&&p.page>1){p.page--;save();renderPage()}};$('nextPage').onclick=()=>{const p=current();if(pdfDoc&&p.page<pdfDoc.numPages){p.page++;save();renderPage()}};$('zoomIn').onclick=()=>{const p=current();p.scale=Math.min(3,(p.scale||1.2)+.15);save();renderPage()};$('zoomOut').onclick=()=>{const p=current();p.scale=Math.max(.5,(p.scale||1.2)-.15);save();renderPage()};$('fitWidth').onclick=()=>{const p=current();const wrap=$('pdfWrap');if(pdfPage){const vp=pdfPage.getViewport({scale:1});p.scale=Math.max(.5,(wrap.clientWidth-32)/vp.width);save();renderPage()}};$('toggleRuler').onclick=()=>{const p=current();p.rulerVisible=!p.rulerVisible;save();renderForm()};$('centerArrow').onclick=()=>{current().arrowX=.5;save();setRulerStyle()};$('opacityRange').oninput=e=>{current().rulerOpacity=+e.target.value;$('opacityVal').textContent=e.target.value+'%';setRulerStyle();save()};
$('counterSelect').onchange=e=>{current().activeCounter=+e.target.value;save();renderCounters()};$('counterName').onchange=e=>{current().counters[current().activeCounter].name=e.target.value||'Compteur';save();renderCounters()};$('incCount').onclick=()=>{current().counters[current().activeCounter].value++;save();renderCounters()};$('decCount').onclick=()=>{const c=current().counters[current().activeCounter];c.value=Math.max(0,c.value-1);save();renderCounters()};$('addCounter').onclick=()=>{current().counters.push({name:'Compteur '+(current().counters.length+1),value:0});current().activeCounter=current().counters.length-1;save();renderCounters()};
$('drawBtn').onclick=()=>{drawing=!drawing;$('pdfWrap').classList.toggle('drawMode',drawing);$('drawStatus').textContent=drawing?'Activé':'Désactivé'};$('undoMark').onclick=()=>{const p=current();const arr=(p.marks[p.page]||[]);arr.pop();save();renderMarks()};$('clearMarks').onclick=()=>{const p=current();p.marks[p.page]=[];save();renderMarks()};
$('notes').oninput=e=>{current().notes=e.target.value;save()};['startDate','endDate'].forEach(id=>$(id).onchange=e=>{current().dates=current().dates||{};current().dates[id==='startDate'?'start':'end']=e.target.value;calcDuration();save()});$('addCombo').onclick=()=>{const v=$('comboText').value.trim();if(v){current().combos.push(v);$('comboText').value='';save();renderCombos()}};['yarnBrand','yarnName','yarnColor','yarnFiber','yarnMeters','yarnBalls','yarnPrice','gauge'].forEach(id=>$(id).oninput=e=>{current().yarn=current().yarn||{};current().yarn[id]=e.target.value;save()});$('saveProject').onclick=()=>saveFile(current().name,current());$('restoreInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const p=JSON.parse(rd.result);if(!p.id)p.id=uid();state.projects[p.id]=p;state.active=p.id;save();renderForm();alert('Projet restauré.')}catch(err){alert('Fichier non valide.')}};rd.readAsText(f)};
let drag=null;function pos(ev){const t=ev.touches?ev.touches[0]:ev;const rect=$('pdfStage').getBoundingClientRect();return {x:t.clientX-rect.left,y:t.clientY-rect.top}}$('ruler').addEventListener('pointerdown',e=>{drag='ruler';$('ruler').setPointerCapture(e.pointerId)});$('arrow').addEventListener('pointerdown',e=>{drag='arrow';e.stopPropagation();$('arrow').setPointerCapture(e.pointerId)});window.addEventListener('pointermove',e=>{if(!drag)return;const p=current(),pt=pos(e);if(drag==='ruler')p.rulerY=Math.max(0,Math.min($('pdfCanvas').height-24,pt.y-12));if(drag==='arrow')p.arrowX=Math.max(0,Math.min(1,pt.x/$('pdfCanvas').width));setRulerStyle();save()});window.addEventListener('pointerup',()=>drag=null);
const layer=$('highlightLayer');layer.addEventListener('pointerdown',e=>{if(!drawing)return;startPt=pos(e);layer.setPointerCapture(e.pointerId)});layer.addEventListener('pointermove',e=>{if(!drawing||!startPt)return});layer.addEventListener('pointerup',e=>{if(!drawing||!startPt)return;const p=current(),end=pos(e);const x=Math.min(startPt.x,end.x),w=Math.max(18,Math.abs(end.x-startPt.x));const y=(startPt.y+end.y)/2+6;p.marks[p.page]=p.marks[p.page]||[];p.marks[p.page].push({x,y,w});startPt=null;save();renderMarks()});}
load();wire();renderForm();
</script>
</body></html>
